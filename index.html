<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }
        section {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #333;
            color: white;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<section>
    <h2>About Me</h2>
    <p>This is a simple website created using HTML and CSS.</p>
    <button onclick="showMessage()">Click Me</button>
</section>

<footer>
    <p>© 2026 My Simple Website</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! Thanks for visiting my website.");
    }
</script>

</body>
</html>
